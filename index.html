<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>


:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;--line:#333;--text:#f0ede8;--muted:#888;--faint:#555;--income:#5fb87a;--expense:#e8634a;--saving:#5b9bd5;--fixed:#c97fd4;--accent:#e8c96a;--font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.header{background:var(--bg);border-bottom:1px solid var(--line);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:700;letter-spacing:.08em;color:var(--accent);}
.month-nav{display:flex;align-items:center;gap:12px;}
.month-nav button{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:4px;font-size:13px;transition:all .15s;}
.month-nav button:hover{border-color:var(--faint);color:var(--text);}
.month-label{font-size:14px;font-weight:500;min-width:80px;text-align:center;}
.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg);padding:0 2rem;overflow-x:auto;}
.tab{padding:12px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
.main{max-width:960px;margin:0 auto;padding:1.5rem 2rem 4rem;}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1rem 1.2rem;}
.card-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.card-value{font-family:var(--mono);font-size:22px;font-weight:500;}
.card-value.income{color:var(--income);}
.card-value.expense{color:var(--expense);}
.card-value.balance{color:var(--accent);}
.section-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:1.5rem 0 .75rem;display:flex;justify-content:space-between;align-items:center;}
.btn-add{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:12px;padding:4px 12px;border-radius:4px;font-family:var(--font);transition:all .15s;}
.btn-add:hover{border-color:var(--accent);color:var(--accent);}
.tx-list{background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.tx-item{display:grid;grid-template-columns:36px 1fr auto auto;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);transition:background .1s;}
.tx-item:last-child{border-bottom:none;}
.tx-item:hover{background:var(--bg3);}
.tx-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.tx-icon.income{background:rgba(95,184,122,.12);}
.tx-icon.expense{background:rgba(232,99,74,.12);}
.tx-icon.fixedtype{background:rgba(201,127,212,.12);}
.tx-icon.savingtype{background:rgba(91,155,213,.12);}
.tx-info{min-width:0;}
.tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.tx-badge{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;margin-right:4px;}
.badge-fixed{background:rgba(201,127,212,.15);color:var(--fixed);}
.badge-saving{background:rgba(91,155,213,.15);color:var(--saving);}
.tx-amount{font-family:var(--mono);font-size:14px;font-weight:500;text-align:right;white-space:nowrap;}
.tx-amount.income{color:var(--income);}
.tx-amount.expense{color:var(--expense);}
.tx-actions{display:flex;gap:4px;}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--faint);font-size:14px;padding:4px;border-radius:4px;transition:color .15s;line-height:1;}
.btn-icon:hover{color:var(--text);}
.empty{padding:2rem;text-align:center;color:var(--faint);font-size:13px;}
/* Alert banner */
.alert-wrap{margin-bottom:8px;}
.alert-banner{background:rgba(232,193,74,.08);border:1px solid rgba(232,193,74,.25);border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px;display:flex;align-items:flex-start;gap:8px;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-content{flex:1;color:var(--text);}
.alert-content strong{color:var(--accent);}
.alert-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 0 0 8px;line-height:1;flex-shrink:0;}
.alert-close:hover{color:var(--text);}
/* Overlay / Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:12px;width:480px;max-width:calc(100vw - 2rem);max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.2rem 1.4rem 0;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:4px;}
.modal-body{padding:1.2rem 1.4rem;}
.modal-footer{padding:0 1.4rem 1.4rem;display:flex;gap:8px;justify-content:flex-end;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:500;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:9px 12px;font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:var(--bg3);}
.field textarea{resize:vertical;min-height:56px;}
.type-btns{display:flex;gap:8px;}
.type-btn{flex:1;padding:8px;border:1px solid var(--line);background:var(--bg3);color:var(--muted);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);transition:all .15s;text-align:center;}
.type-btn.active-income{background:rgba(95,184,122,.12);border-color:var(--income);color:var(--income);}
.type-btn.active-expense{background:rgba(232,99,74,.12);border-color:var(--expense);color:var(--expense);}
.btn-cancel{background:none;border:1px solid var(--line);color:var(--muted);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-family:var(--font);}
.btn-save{background:var(--accent);border:none;color:#111;padding:8px 24px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;font-family:var(--font);}
.btn-save:hover{opacity:.9;}
.btn-delete{background:none;border:1px solid var(--expense);color:var(--expense);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-family:var(--font);transition:all .15s;}
.btn-delete:hover{background:rgba(232,99,74,.12);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* Savings */
.bank-group{margin-bottom:1rem;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.bank-group-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);cursor:pointer;user-select:none;}
.bank-group-header:hover{background:var(--bg4);}
.bank-group-icon{font-size:16px;}
.bank-group-name{font-size:13px;font-weight:700;color:var(--saving);flex:1;}
.bank-group-meta{font-family:var(--mono);font-size:12px;color:var(--muted);}
.bank-group-toggle{font-size:12px;color:var(--faint);transition:transform .2s;display:inline-block;}
.bank-group-toggle.open{transform:rotate(180deg);}
.bank-group-body{display:none;}
.bank-group-body.open{display:block;}
.saving-card{padding:1rem 1.2rem;border-top:1px solid var(--line);background:var(--bg2);}
.saving-card:hover{background:var(--bg3);}
.saving-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.saving-name{font-size:14px;font-weight:700;}
.saving-type{font-size:11px;color:var(--muted);margin-top:2px;}
.saving-amount{font-family:var(--mono);font-size:16px;color:var(--saving);font-weight:500;}
.saving-actions{display:flex;gap:4px;margin-top:4px;justify-content:flex-end;}
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;margin:8px 0;overflow:hidden;}
.progress-fill{height:100%;background:var(--saving);border-radius:2px;}
.saving-dates{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.d-day{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;display:inline-block;margin-top:4px;}
.d-day.soon{background:rgba(232,193,74,.15);color:var(--accent);}
.d-day.normal{background:rgba(91,155,213,.1);color:var(--saving);}
.d-day.expired{background:rgba(232,99,74,.1);color:var(--expense);}
/* CMA / 입출금 계좌 */
.cma-card{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1rem 1.2rem;margin-bottom:8px;}
.cma-card:hover{background:var(--bg3);}
.cma-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cma-name{font-size:14px;font-weight:700;}
.cma-balance{font-family:var(--mono);font-size:18px;color:var(--income);font-weight:500;}
.cma-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.cma-flows{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.cma-flow-item{background:var(--bg3);border-radius:6px;padding:8px 10px;}
.cma-flow-label{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase;}
.cma-flow-val{font-family:var(--mono);font-size:13px;font-weight:500;}
.cma-flow-val.out{color:var(--expense);}
.cma-flow-val.in{color:var(--income);}
/* Chart */
.chart-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1.2rem;margin-bottom:1rem;}
.chart-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--muted);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.bar-val{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:80px;text-align:right;white-space:nowrap;}
/* AI 제안 */
.suggest-card{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1.2rem;margin-bottom:10px;}
.suggest-card h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.suggest-card p{font-size:13px;color:var(--text);line-height:1.7;}
.suggest-card ul{padding-left:1.2rem;font-size:13px;color:var(--text);line-height:2;}
.suggest-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;margin-right:4px;margin-bottom:4px;}
.tag-warn{background:rgba(232,99,74,.15);color:var(--expense);}
.tag-good{background:rgba(95,184,122,.15);color:var(--income);}
.tag-tip{background:rgba(232,193,74,.12);color:var(--accent);}
.ai-loading{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
.ai-refresh{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:12px;padding:5px 14px;border-radius:4px;font-family:var(--font);transition:all .15s;}
.ai-refresh:hover{border-color:var(--accent);color:var(--accent);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
@media(max-width:600px){
.header{padding:0 1rem;}.main{padding:1rem 1rem 4rem;}
.summary{grid-template-columns:1fr 1fr;}.summary .card:last-child{grid-column:1/-1;}
.tabs{padding:0 .5rem;}.row2{grid-template-columns:1fr;}
}


</style>
</head>
<body>

<div class="header">
  <div class="logo">&#128176; 가계부</div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <span id="syncStatus" style="font-size:11px;color:#888;white-space:nowrap;">● 로컬</span>
    <span id="userInfo" style="font-size:11px;color:#888;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none;"></span>
    <button id="btnLogin"  style="display:inline-block;background:none;border:1px solid #555;color:#ccc;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap;font-family:inherit;">Google 로그인</button>
    <button id="btnLogout" style="display:none;background:none;border:1px solid #555;color:#888;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;">로그아웃</button>
    <button id="btnSync" style="display:none;background:#2d6a4f;border:none;color:#fff;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;">&#8635; 동기화</button>
  </div>
  <div class="month-nav">
    <button id="btnPrev">&#9664;</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="btnNext">&#9654;</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="suggest">&#129504; 제안</div>
  <div class="tab" data-tab="ledger">내역</div>
  <div class="tab" data-tab="fixed">정기지출</div>
  <div class="tab" data-tab="savings">적금/예금</div>
  <div class="tab" data-tab="stats">통계</div>
</div>
<div class="main">
  <div id="alertArea" class="alert-wrap"></div>
  <div id="tab-suggest"></div>
  <div id="tab-ledger" style="display:none">
    <div class="summary">
      <div class="card"><div class="card-label">수입</div><div class="card-value income" id="sumIncome">&#8361;0</div></div>
      <div class="card"><div class="card-label">지출</div><div class="card-value expense" id="sumExpense">&#8361;0</div></div>
      <div class="card"><div class="card-label">잔액</div><div class="card-value balance" id="sumBalance">&#8361;0</div></div>
    </div>
    <div class="section-title">이번 달 내역 <button class="btn-add" id="btnAddTx">+ 추가</button></div>
    <div class="tx-list" id="txList"></div>
  </div>
  <div id="tab-fixed" style="display:none">
    <div class="section-title">정기 지출 <button class="btn-add" id="btnAddFixed">+ 추가</button></div>
    <div class="tx-list" id="fixedList"></div>
  </div>
  <div id="tab-savings" style="display:none">
    <div class="section-title">입출금 계좌 <button class="btn-add" id="btnAddCMA">+ 계좌추가</button></div>
    <div id="cmaList"></div>
    <div class="section-title" style="margin-top:1.5rem">적금 / 예금 <button class="btn-add" id="btnAddSaving">+ 추가</button></div>
    <div id="savingList"></div>
  </div>
  <div id="tab-stats" style="display:none">
    <div class="chart-wrap"><div class="chart-title">지출 카테고리 (이번 달)</div><div id="catChart"></div></div>
    <div class="chart-wrap"><div class="chart-title">월별 지출 추이 (최근 6개월)</div><div id="monthChart"></div></div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" id="btnClose">&#215;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-delete" id="btnDelete" style="display:none;margin-right:auto">삭제</button>
      <button class="btn-cancel" id="btnCancel">취소</button>
      <button class="btn-save" id="btnSave">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 (confirm 대체) -->
<div id="delOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;justify-content:center;align-items:center;">
  <div style="background:#1a1a1a;border:1px solid #444;border-radius:12px;padding:28px 28px 20px;width:300px;max-width:90vw;text-align:center;">
    <div style="font-size:15px;font-weight:700;margin-bottom:10px;color:#f0ede8;">정말 삭제할까요?</div>
    <div id="delMsg" style="font-size:13px;color:#888;margin-bottom:22px;"></div>
    <div style="display:flex;gap:10px;">
      <button id="delNo"  style="flex:1;padding:10px;border:1px solid #444;background:none;color:#888;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;">취소</button>
      <button id="delYes" style="flex:1;padding:10px;border:none;background:#e8634a;color:#fff;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;">삭제</button>
    </div>
  </div>
</div>


<script>

// ============ Firebase 설정 ============
var FB_CFG = {
  apiKey:            "AIzaSyCwHLfgVzCbYyWVQl-6OaoYAle5abLr0Sk",
  authDomain:        "kakeibo-bc79a.firebaseapp.com",
  projectId:         "kakeibo-bc79a",
  storageBucket:     "kakeibo-bc79a.firebasestorage.app",
  messagingSenderId: "173960952463",
  appId:             "1:173960952463:web:261c8fce8a664695428efa"
};

var fbApp, fbDB, fbAuth, fbUser = null;
var COLS = ['transactions','fixedExpenses','savings','cmaAccounts'];

function initFB() {
  try {
    fbApp  = firebase.initializeApp(FB_CFG);
    fbDB   = firebase.firestore();
    fbAuth = firebase.auth();

    document.getElementById('btnLogin').onclick  = function() {
      fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
        .catch(function(e){ alert('로그인 실패: ' + e.message); });
    };
    document.getElementById('btnLogout').onclick = function() {
      fbAuth.signOut();
    };

    // 동기화 버튼
    document.getElementById('btnSync').onclick = function() {
      if(!fbUser) return;
      var btn = document.getElementById('btnSync');
      btn.textContent = '↻ 저장 중...';
      btn.disabled = true;
      var COLS2 = ['transactions','fixedExpenses','savings','cmaAccounts'];
      var promises = COLS2.map(function(col) {
        var data = JSON.parse(localStorage.getItem(col) || '[]');
        var ref  = userCol(col);
        if(!ref) return Promise.resolve();
        return ref.get().then(function(snap) {
          var batch = fbDB.batch();
          var ids = data.map(function(x){ return x.id; });
          snap.forEach(function(doc){ if(ids.indexOf(doc.id)===-1) batch.delete(ref.doc(doc.id)); });
          data.forEach(function(item){ if(item.id) batch.set(ref.doc(item.id), item); });
          return batch.commit();
        });
      });
      Promise.all(promises).then(function() {
        btn.textContent = '✓ 저장완료';
        btn.style.background = '#5fb87a';
        setTimeout(function() {
          btn.textContent = '&#8635; 동기화';
          btn.style.background = '#2d6a4f';
          btn.disabled = false;
        }, 2000);
      }).catch(function() {
        btn.textContent = '오류발생';
        btn.style.background = '#e8634a';
        setTimeout(function() {
          btn.textContent = '&#8635; 동기화';
          btn.style.background = '#2d6a4f';
          btn.disabled = false;
        }, 2000);
      });
    };

    fbAuth.onAuthStateChanged(function(user) {
      fbUser = user;
      var loginBtn  = document.getElementById('btnLogin');
      var logoutBtn = document.getElementById('btnLogout');
      var userInfo  = document.getElementById('userInfo');
      if (user) {
        loginBtn.style.display  = 'none';
        logoutBtn.style.display = 'inline-block';
        userInfo.style.display  = 'inline';
        userInfo.textContent    = user.displayName || user.email || '';
        document.getElementById('btnSync').style.display = 'inline-block';
        setSyncStatus('syncing');
        // 로컬 데이터 Firebase로 올리고, Firebase 데이터 받아오기
        migrateAndLoad();
      } else {
        loginBtn.style.display  = 'inline-block';
        logoutBtn.style.display = 'none';
        userInfo.style.display  = 'none';
        document.getElementById('btnSync').style.display = 'none';
        setSyncStatus('offline');
      }
    });
  } catch(e) {
    console.error('Firebase init error:', e);
  }
}

function setSyncStatus(s) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  if      (s === 'syncing') { el.textContent = '↻ 동기화 중'; el.style.color = '#e8c96a'; }
  else if (s === 'online')  { el.textContent = '● 연동됨';    el.style.color = '#5fb87a'; }
  else if (s === 'error')   { el.textContent = '● 오류';      el.style.color = '#e8634a'; }
  else                      { el.textContent = '● 로컬';      el.style.color = '#888'; }
}

function userCol(col) {
  if (!fbDB || !fbUser) return null;
  return fbDB.collection('users').doc(fbUser.uid).collection(col);
}

// 로컬 → Firebase 업로드 후 실시간 리스너 시작
function migrateAndLoad() {
  if (!fbUser) return;
  var ref0 = userCol(COLS[0]);
  if (!ref0) return;

  ref0.limit(1).get().then(function(snap) {
    if (snap.empty) {
      // Firebase 비어있음 → 로컬 데이터 업로드
      var batch = fbDB.batch();
      COLS.forEach(function(col) {
        var local = JSON.parse(localStorage.getItem(col) || '[]');
        local.forEach(function(item) {
          if (item.id) batch.set(userCol(col).doc(item.id), item);
        });
      });
      return batch.commit();
    }
  }).then(function() {
    // 실시간 리스너 등록
    COLS.forEach(function(col) {
      userCol(col).onSnapshot(function(snap) {
        var items = [];
        snap.forEach(function(doc) { items.push(doc.data()); });
        localStorage.setItem(col, JSON.stringify(items));
        renderAll();
        setSyncStatus('online');
      });
    });
  }).catch(function(e) {
    console.error('migrateAndLoad error:', e);
    setSyncStatus('error');
  });
}

// SAVE 함수 오버라이드 — Firebase에도 저장
var _origSave = null;
function SAVE(k, v) {
  localStorage.setItem(k, JSON.stringify(v));
  if (!fbUser || !fbDB) return;
  setSyncStatus('syncing');
  var ref = userCol(k);
  if (!ref) return;

  ref.get().then(function(snap) {
    var batch = fbDB.batch();
    var newIds = v.map(function(x){ return x.id; });
    // 삭제된 항목 제거
    snap.forEach(function(doc) {
      if (newIds.indexOf(doc.id) === -1) batch.delete(ref.doc(doc.id));
    });
    // 추가/수정
    v.forEach(function(item) {
      if (item.id) batch.set(ref.doc(item.id), item);
    });
    return batch.commit();
  }).then(function() {
    setSyncStatus('online');
  }).catch(function(e) {
    console.error('SAVE error:', e);
    setSyncStatus('error');
  });
}

// ===================== 이번달 트랜잭션 =====================
function getMonthTx(){
  var key = MK();
  var txs = DB('transactions').filter(function(t){ return t.date && t.date.startsWith(key); });
  DB('fixedExpenses').forEach(function(f){
    var s = f.startDate ? f.startDate.slice(0,7) : key;
    var e = f.endDate   ? f.endDate.slice(0,7)   : '9999-12';
    if(key<s||key>e) return;
    if(txs.find(function(t){ return t.fixedRef===f.id && t.date.startsWith(key); })) return;
    txs.push({id:UID(),fixedRef:f.id,name:f.name,amount:-Math.abs(f.amount),category:f.category,date:key+'-'+PAD(f.payDay||1),auto:true,accountId:f.accountId});
  });
  DB('savings').forEach(function(s){
    if(!s.transDay) return;
    var sd = s.startDate ? s.startDate.slice(0,7) : key;
    var ed = s.endDate   ? s.endDate.slice(0,7)   : '9999-12';
    if(key<sd||key>ed) return;
    if(txs.find(function(t){ return t.savingRef===s.id && t.date.startsWith(key); })) return;
    // 납부금액이 있을 때만 자동 차감 (없으면 스킵)
    if(!s.payAmount) return;
    var deductAmt = Math.abs(s.payAmount);
    txs.push({id:UID(),savingRef:s.id,name:s.name+' \uB0A9\uC785',amount:-deductAmt,category:'\uD83D\uDCB0 \uAE30\uD0C0',date:key+'-'+PAD(s.transDay),auto:true,accountId:s.accountId});
  });
  return txs.sort(function(a,b){ return b.date.localeCompare(a.date); });
}

  var today  = new Date();
  var cmaMap = {}; DB('cmaAccounts').forEach(function(c){ cmaMap[c.id]=c.name; });
  var groups = {};
  savings.forEach(function(s){ var b=s.bank||'\uAE30\uD0C0'; if(!groups[b]) groups[b]=[]; groups[b].push(s); });
  var html = '';
  Object.keys(groups).forEach(function(bank){
    var items = groups[bank];
    var total = items.reduce(function(a,s){ return a+Math.abs(s.amount||0); },0);
    var icon  = BANK_ICONS[bank]||'\uD83C\uDFE6';
    var gid   = 'GRP_'+bank.replace(/[^a-zA-Z0-9]/g,'_');
    html += '<div class="bank-group">'+
      '<div class="bank-group-header" id="HDR_'+gid+'">'+
        '<span class="bank-group-icon">'+icon+'</span>'+
        '<span class="bank-group-name">'+ESC(bank)+'</span>'+
        '<span class="bank-group-meta">'+FMT(total)+' &middot; '+items.length+'\uAC74</span>'+
        '<span class="bank-group-toggle open" id="TOG_'+gid+'">&#9660;</span>'+
      '</div>'+
      '<div class="bank-group-body open" id="'+gid+'">';
    items.forEach(function(s){
      var start = s.startDate ? new Date(s.startDate) : null;
      var end   = s.endDate   ? new Date(s.endDate)   : null;
      var pct   = 0;
      if(start&&end) pct = Math.min(100,Math.max(0,Math.round((today-start)/(end-start)*100)));
      var diff  = end ? Math.ceil((end-today)/86400000) : null;
      var dday='',dcls='normal';
      if(diff!==null){
        if(diff<0){dday='\uB9CC\uAE30\uC644\uB8CC';dcls='expired';}
        else if(diff===0){dday='D-DAY';dcls='soon';}
        else if(diff<=30){dday='D-'+diff;dcls='soon';}
        else{dday='D-'+diff;}
      }
      var acct = s.accountId&&cmaMap[s.accountId] ? cmaMap[s.accountId] : '';
      var meta = (s.stype||'\uC801\uAE08')+' &middot; \uC5F0 '+(s.rate||0)+'%';
      if(s.payAmount) meta+=' &middot; \uB9E4\uC6D4 \uB0A9\uBD80 '+FMT(s.payAmount);
      if(s.transDay)  meta+=' &middot; '+s.transDay+'\uC77C \uCD9C\uAE08';
      if(acct)        meta+=' &middot; '+ESC(acct);
      if(s.memo)      meta+=' &middot; '+ESC(s.memo);
      html += '<div class="saving-card">'+
        '<div class="saving-header">'+
          '<div><div class="saving-name">'+ESC(s.name)+'</div><div class="saving-type">'+meta+'</div></div>'+
          '<div style="text-align:right"><div class="saving-amount">'+FMT(s.amount)+'</div>'+
          (dday?'<span class="d-day '+dcls+'">'+dday+'</span>':'')+'</div>'+
        '</div>';
      if(start&&end){
        html += '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
          '<div class="saving-dates"><span>'+ESC(s.startDate)+'</span><span style="color:var(--saving)">'+ESC(s.endDate)+' \uB9CC\uAE30</span></div>';
      }
      html += '<div class="saving-actions"><button class="btn-icon" data-action="edit" data-type="saving" data-id="'+ESC(s.id)+'">&#9999;&#65039;</button></div></div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;

  // 편집 버튼
  container.querySelectorAll('[data-action="edit"]').forEach(function(btn){
    btn.onclick = function(){
      var id = btn.getAttribute('data-id');
      var s  = DB('savings').find(function(x){ return x.id===id; });
      if(s) openModal('saving',s);
    };
  });
  // 그룹 토글
  Object.keys(groups).forEach(function(bank){
    var gid = 'GRP_'+bank.replace(/[^a-zA-Z0-9]/g,'_');
    var hdr = document.getElementById('HDR_'+gid);
    if(!hdr) return;
    hdr.onclick = function(){
      var body = document.getElementById(gid);
      var tog  = document.getElementById('TOG_'+gid);
      var open = body.classList.toggle('open');
      if(tog) tog.classList.toggle('open',open);
    };
  });
}

// ===================== 통계 =====================
function renderStats(){
  var txs = getMonthTx().filter(function(t){ return t.amount<0; });
  var catMap={};
  txs.forEach(function(t){ var c=t.category||'\uD83D\uDCB0 \uAE30\uD0C0'; catMap[c]=(catMap[c]||0)+Math.abs(t.amount); });
  var cats=Object.entries(catMap).sort(function(a,b){ return b[1]-a[1]; });
  var maxC=cats.length?cats[0][1]:1;
  document.getElementById('catChart').innerHTML = cats.length
    ? cats.map(function(e){ return '<div class="bar-row"><span class="bar-label">'+ESC(e[0])+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(e[1]/maxC*100).toFixed(1)+'%;background:var(--expense)"></div></div><span class="bar-val">'+FMT(e[1])+'</span></div>'; }).join('')
    : '<div class="empty" style="padding:1rem">\uB370\uC774\uD130 \uC5C6\uC74C</div>';
  var months=[];
  for(var i=5;i>=0;i--){ var y=CY,m=CM-i; while(m<1){m+=12;y--;} months.push({key:y+'-'+PAD(m),label:m+'\uC6D4'}); }
  var allTx=DB('transactions'),allFx=DB('fixedExpenses'),maxM=1;
  var mData=months.map(function(mo){
    var tot=0;
    allTx.filter(function(t){ return t.date&&t.date.startsWith(mo.key)&&t.amount<0; }).forEach(function(t){ tot+=Math.abs(t.amount); });
    allFx.forEach(function(f){ var s=f.startDate?f.startDate.slice(0,7):mo.key; var e=f.endDate?f.endDate.slice(0,7):'9999-12'; if(s<=mo.key&&e>=mo.key) tot+=Math.abs(f.amount); });
    if(tot>maxM) maxM=tot;
    return {label:mo.label,total:tot};
  });
  document.getElementById('monthChart').innerHTML = mData.map(function(m){
    return '<div class="bar-row"><span class="bar-label">'+m.label+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(m.total/maxM*100).toFixed(1)+'%;background:var(--saving)"></div></div><span class="bar-val">'+FMT(m.total)+'</span></div>';
  }).join('');
}

// ===================== AI 제안 =====================
function renderSuggest(){
  var el = document.getElementById('tab-suggest');
  if(!el||el.style.display==='none') return;
  var txs=DB('transactions'),fixed=DB('fixedExpenses'),savings=DB('savings'),cmas=DB('cmaAccounts');
  if(!txs.length&&!fixed.length&&!savings.length){
    el.innerHTML='<div class="section-title">AI \uC7AC\uBB34 \uBD84\uC11D</div><div class="suggest-card"><h3>\uD83D\uDCCA \uB370\uC774\uD130 \uBD80\uC871</h3><p>\uB0B4\uC5ED, \uC815\uAE30\uC9C0\uCD9C, \uC801\uAE08/\uC608\uAE08\uC744 \uB4F1\uB85D\uD558\uBA74 AI \uBD84\uC11D\uC774 \uC2DC\uC791\uB429\uB2C8\uB2E4.</p></div>';
    return;
  }
  var key=MK(),today=new Date();
  var mTxs=txs.filter(function(t){ return t.date&&t.date.startsWith(key); });
  var income=mTxs.filter(function(t){return t.amount>0;}).reduce(function(a,t){return a+t.amount;},0);
  var expense=mTxs.filter(function(t){return t.amount<0;}).reduce(function(a,t){return a+Math.abs(t.amount);},0);
  var fixedT=fixed.reduce(function(a,f){return a+Math.abs(f.amount);},0);
  var savingT=savings.reduce(function(a,s){return a+Math.abs(s.amount);},0);
  var cmaT=cmas.reduce(function(a,c){return a+(Number(c.balance||c.initialBalance)||0);},0);
  var savRate=income>0?Math.round((income-expense)/income*100):0;
  var rTag=savRate>=20?'<span class="suggest-tag tag-good">\uC591\uD638</span>':savRate>=10?'<span class="suggest-tag tag-tip">\uBCF4\uD1B5</span>':'<span class="suggest-tag tag-warn">\uAC1C\uC120\uD544\uC694</span>';
  var html='<div class="section-title">AI \uC7AC\uBB34 \uBD84\uC11D &amp; \uC81C\uC548</div>';
  html+='<div class="suggest-card"><h3>\uD83D\uDCCA \uC774\uB2EC \uC694\uC57D</h3><p>\uC218\uC785 <strong style="color:var(--income)">'+FMT(income)+'</strong> &middot; \uC9C0\uCD9C <strong style="color:var(--expense)">'+FMT(expense)+'</strong> &middot; \uC800\uCD95\uB960 <strong style="color:var(--accent)">'+savRate+'%</strong></p><p style="margin-top:6px">\uC785\uCD9C\uAE08 \uC794\uC561 <strong style="color:var(--saving)">'+FMT(cmaT)+'</strong> &middot; \uC815\uAE30\uC9C0\uCD9C <strong>'+FMT(fixedT)+'/\uC6D4</strong></p></div>';
  html+='<div class="suggest-card"><h3>\uD83D\uDCA1 \uC800\uCD95\uB960 '+rTag+'</h3>';
  if(savRate>=20) html+='<p>\uC800\uCD95\uB960 '+savRate+'%\uB85C \uC6B0\uC218\uD569\uB2C8\uB2E4! &#128077;</p>';
  else if(savRate>=10) html+='<p>\uC800\uCD95\uB960 '+savRate+'%\uC785\uB2C8\uB2E4. \uB9E4\uC6D4 <strong>'+FMT(Math.round(income*0.2-(income-expense)))+'</strong> \uCD94\uAC00 \uC808\uC57D\uC73C\uB85C 20% \uB2EC\uC131 \uAC00\uB2A5\uD569\uB2C8\uB2E4.</p>';
  else if(income>0) html+='<p>\uC800\uCD95\uB960 '+savRate+'%\uB85C \uB099\uC2B5\uB2C8\uB2E4. \uACE0\uC815 \uC9C0\uCD9C \uBE44\uC911\uC744 \uC810\uAC80\uD558\uC138\uC694.</p>';
  else html+='<p>\uC218\uC785 \uB0B4\uC5ED\uC744 \uB4F1\uB85D\uD558\uBA74 \uC800\uCD95\uB960 \uBD84\uC11D\uC774 \uAC00\uB2A5\uD569\uB2C8\uB2E4.</p>';
  html+='</div>';
  if(savingT>0||fixedT>0) html+='<div class="suggest-card"><h3>&#10024; \uD301</h3><ul>'+(savingT>0?'<li>\uC801\uAE08/\uC608\uAE08 \uB0A9\uC785 <strong>'+FMT(savingT)+'/\uC6D4</strong> &#128077;</li>':'')+'<li>\uBE44\uC0C1\uAE08\uC740 \uC0DD\uD65C\uBE44 3~6\uAC1C\uC6D4\uCE58 \uD30C\uD0B9\uD1B5\uC7A5 \uC720\uC9C0 \uAD8C\uC7A5</li>'+(fixedT>0&&income>0&&Math.round(fixedT/income*100)>40?'<li>\uC815\uAE30\uC9C0\uCD9C \uBE44\uC911\uC774 \uB192\uC2B5\uB2C8\uB2E4. \uAD6C\uB3C5 \uC11C\uBE44\uC2A4\uB97C \uC810\uAC80\uD558\uC138\uC694.</li>':'')+'</ul></div>';
  el.innerHTML = html;
}

// ===================== 모달 열기 =====================
function openModal(type, data){
  MODAL_TYPE = type;
  MODAL_ID   = data ? data.id : null;

  document.getElementById('modalTitle').textContent =
    type==='tx'     ? (MODAL_ID?'\uB0B4\uC5ED \uC218\uC815':'\uB0B4\uC5ED \uCD94\uAC00') :
    type==='fixed'  ? (MODAL_ID?'\uC815\uAE30\uC9C0\uCD9C \uC218\uC815':'\uC815\uAE30\uC9C0\uCD9C \uCD94\uAC00') :
    type==='saving' ? (MODAL_ID?'\uC801\uAE08/\uC608\uAE08 \uC218\uC815':'\uC801\uAE08/\uC608\uAE08 \uCD94\uAC00') :
                     (MODAL_ID?'\uACC4\uC88C \uC218\uC815':'\uC785\uCD9C\uAE08 \uACC4\uC88C \uCD94\uAC00');

  // 삭제 버튼 표시/숨김

    DB('cmaAccounts').map(function(c){

      '<button class="type-btn'+(!isInc?' active-expense':'')+ '" id="btnExpense">&minus; \uC9C0\uCD9C</button>'+
      '</div></div>'+
      '<div class="field"><label>\uC774\uB984</label><input id="f_name" value="'+ESC(data?data.name:'')+'"></div>'+
      '<div class="row2"><div class="field"><label>\uAE08\uC561</label><input id="f_amount" type="number" value="'+(data?Math.abs(data.amount):'')+'"></div>'+
      '<div class="field"><label>\uB0A0\uC9DC</label><input id="f_date" type="date" value="'+(data?data.date:new Date().toISOString().slice(0,10))+'"></div></div>'+
      '<div class="row2"><div class="field"><label>\uCE74\uD14C\uACE0\uB9AC</label><select id="f_cat">'+cOpts+'</select></div>'+
      '<div class="field"><label>\uACC4\uC88C</label><select id="f_account">'+cmaOpts+'</select></div></div>'+
      '<div class="field"><label>\uBA54\uBAA8</label><input id="f_memo" value="'+ESC(data&&data.memo?data.memo:'')+'"></div>';
    document.getElementById('btnIncome').onclick  = function(){ document.getElementById('btnIncome').className='type-btn active-income'; document.getElementById('btnExpense').className='type-btn'; };
    document.getElementById('btnExpense').onclick = function(){ document.getElementById('btnExpense').className='type-btn active-expense'; document.getElementById('btnIncome').className='type-btn'; };

  } else if(type==='fixed'){
    var cOpts2 = FIXED_CATS.map(function(v){ return '<option'+(data&&data.category===v?' selected':'')+'>'+v+'</option>'; }).join('');
    body.innerHTML =
      '<div class="field"><label>\uC774\uB984</label><input id="f_name" value="'+ESC(data?data.name:'')+'"></div>'+
      '<div class="row2"><div class="field"><label>\uC6D4 \uAE08\uC561</label><input id="f_amount" type="number" value="'+(data?data.amount:'')+'"></div>'+
      '<div class="field"><label>\uCE74\uD14C\uACE0\uB9AC</label><select id="f_cat">'+cOpts2+'</select></div></div>'+

      '<div class="field"><label>\uCD9C\uAE08 \uACC4\uC88C</label><select id="f_account">'+cmaOpts+'</select></div></div>'+
      '<div class="row2"><div class="field"><label>\uC2DC\uC791\uC77C (\uC120\uD0DD)</label><input id="f_start" type="date" value="'+(data&&data.startDate?data.startDate:'')+'"></div>'+
      '<div class="field"><label>\uC885\uB8CC\uC77C (\uC120\uD0DD)</label><input id="f_end" type="date" value="'+(data&&data.endDate?data.endDate:'')+'"></div></div>';

      '<div class="row2"><div class="field"><label>\uB9E4\uC6D4 \uB0A9\uBD80\uAE08\uC561 (\u20A9)</label><input id="f_payamt" type="number" placeholder="\uC608: 300000" value="'+(data&&data.payAmount?data.payAmount:'')+'"></div>'+
      '<div class="field"><label>\uB9E4\uC6D4 \uB0A9\uC785\uC77C</label><input id="f_transday" type="number" min="1" max="31" value="'+(data&&data.transDay?data.transDay:'')+'"></div></div>'+
      '<div class="field"><label>\uCD9C\uAE08 \uACC4\uC88C</label><select id="f_account">'+cmaOpts+'</select></div>'+
      '<div class="row2"><div class="field"><label>\uC2DC\uC791\uC77C (\uC120\uD0DD)</label><input id="f_start" type="date" value="'+(data&&data.startDate?data.startDate:'')+'"></div>'+
      '<div class="field"><label>\uB9CC\uAE30\uC77C (\uC120\uD0DD)</label><input id="f_end" type="date" value="'+(data&&data.endDate?data.endDate:'')+'"></div></div>';

  } else if(type==='cma'){
    var bOpts2 = BANKS.map(function(v){ return '<option'+(data&&data.bank===v?' selected':'')+'>'+v+'</option>'; }).join('');
    body.innerHTML =
      '<div class="row2"><div class="field"><label>\uACC4\uC88C \uC774\uB984</label><input id="f_name" value="'+ESC(data?data.name:'')+'"></div>'+
      '<div class="field"><label>\uC740\uD589</label><select id="f_bank">'+bOpts2+'</select></div></div>'+
      '<div class="field"><label>\uD604\uC7AC \uC794\uC561</label><input id="f_balance" type="number" value="'+(data&&data.initialBalance?data.initialBalance:'')+'"></div>'+
      '<div class="field"><label>\uBA54\uBAA8</label><input id="f_memo" value="'+ESC(data&&data.memo?data.memo:'')+'"></div>';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  MODAL_ID = null; MODAL_TYPE = null;
}

// ===================== 저장 =====================
function saveModal(){
  if(MODAL_TYPE==='tx'){
    var name=document.getElementById('f_name').value.trim();
    var amt =parseFloat(document.getElementById('f_amount').value);
    var date=document.getElementById('f_date').value;
    var cat =document.getElementById('f_cat').value;
    var memo=document.getElementById('f_memo').value;
    var acct=document.getElementById('f_account').value;
    if(!name||!amt||!date){ alert('\uC774\uB984, \uAE08\uC561, \uB0A0\uC9DC \uC785\uB825 \uD544\uC694'); return; }
    var isInc = document.getElementById('btnIncome').classList.contains('active-income');
    var arr = DB('transactions');
    var obj = {name:name,amount:isInc?Math.abs(amt):-Math.abs(amt),date:date,category:cat,memo:memo,accountId:acct};
    if(MODAL_ID){ var i=arr.findIndex(function(x){return x.id===MODAL_ID;}); if(i>-1) arr[i]=Object.assign({},arr[i],obj); }
    else arr.push(Object.assign({id:UID()},obj));
    SAVE('transactions',arr);

  } else if(MODAL_TYPE==='fixed'){
    var name2=document.getElementById('f_name').value.trim();
    var amt2 =parseFloat(document.getElementById('f_amount').value);
    var cat2 =document.getElementById('f_cat').value;
    var pd   =document.getElementById('f_payday').value;
    var ac2  =document.getElementById('f_account').value;
    var st2  =document.getElementById('f_start').value;
    var en2  =document.getElementById('f_end').value;
    if(!name2||!amt2){ alert('\uC774\uB984\uACFC \uAE08\uC561 \uC785\uB825 \uD544\uC694'); return; }
    var arr2=DB('fixedExpenses');
    var obj2={name:name2,amount:amt2,category:cat2,payDay:pd||null,accountId:ac2,startDate:st2||null,endDate:en2||null};
    if(MODAL_ID){ var i2=arr2.findIndex(function(x){return x.id===MODAL_ID;}); if(i2>-1) arr2[i2]=Object.assign({},arr2[i2],obj2); }
    else arr2.push(Object.assign({id:UID()},obj2));
    SAVE('fixedExpenses',arr2);

  } else if(MODAL_TYPE==='saving'){
    var name3=document.getElementById('f_name').value.trim();
    var bank3=document.getElementById('f_bank').value;
    var st3  =document.getElementById('f_stype').value;
    var amt3 =parseFloat(document.getElementById('f_amount').value);
    var rate3=parseFloat(document.getElementById('f_rate').value)||0;
    var memo3=document.getElementById('f_memo').value;
    var pa3  =parseFloat(document.getElementById('f_payamt').value)||0;
    var td   =document.getElementById('f_transday').value;
    var ac3  =document.getElementById('f_account').value;
    var sd3  =document.getElementById('f_start').value;
    var ed3  =document.getElementById('f_end').value;
    if(!name3||!amt3){ alert('\uC774\uB984\uACFC \uAE08\uC561 \uC785\uB825 \uD544\uC694'); return; }
    var arr3=DB('savings');
    var obj3={name:name3,bank:bank3,stype:st3,amount:amt3,rate:rate3,memo:memo3,payAmount:pa3||null,transDay:td||null,accountId:ac3,startDate:sd3||null,endDate:ed3||null};
    if(MODAL_ID){ var i3=arr3.findIndex(function(x){return x.id===MODAL_ID;}); if(i3>-1) arr3[i3]=Object.assign({},arr3[i3],obj3); }
    else arr3.push(Object.assign({id:UID()},obj3));
    SAVE('savings',arr3);

  } else if(MODAL_TYPE==='cma'){
    var name4=document.getElementById('f_name').value.trim();
    var bank4=document.getElementById('f_bank').value;
    var bal4 =parseFloat(document.getElementById('f_balance').value)||0;
    var memo4=document.getElementById('f_memo').value;
    if(!name4){ alert('\uACC4\uC88C \uC774\uB984 \uC785\uB825 \uD544\uC694'); return; }
    var arr4=DB('cmaAccounts');
    var obj4={name:name4,bank:bank4,initialBalance:bal4,balance:bal4,memo:memo4};
    if(MODAL_ID){ var i4=arr4.findIndex(function(x){return x.id===MODAL_ID;}); if(i4>-1) arr4[i4]=Object.assign({},arr4[i4],obj4); }
    else arr4.push(Object.assign({id:UID()},obj4));
    SAVE('cmaAccounts',arr4);
  }
  closeModal();
  renderAll();
}
